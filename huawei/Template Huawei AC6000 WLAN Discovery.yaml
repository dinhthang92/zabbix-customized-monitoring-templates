        - uuid: 70a51b088b8e483189be7aa7d4e3054f
          name: 'Huawei WLAN client discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#APNAME},1.3.6.1.4.1.2011.6.139.18.1.2.1.4,{#SSID},1.3.6.1.4.1.2011.6.139.18.1.2.1.18]'
          key: hwWlanStationDiscovery
          delay: '3m'
          lifetime: 2d
          enabled_lifetime_type: DISABLE_NEVER
          description: 'Discovers wireless clients from hwWlanStationTable.'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                    var data = JSON.parse(value);
                  }
                  catch (error) {
                    throw 'Failed to parse JSON of Huawei WLAN client discovery.';
                  }

                  function formatMac(raw) {
                    if (raw === null || raw === undefined) {
                      return '';
                    }

                    raw = String(raw).trim().toLowerCase();
                    if (!raw) {
                      return '';
                    }

                    if (raw.indexOf(':') !== -1) {
                      return raw.split(':').map(function (part) {
                        return part.length === 1 ? '0' + part : part;
                      }).join(':');
                    }

                    if (raw.indexOf('.') !== -1) {
                      return raw.split('.').map(function (part) {
                        var octet = parseInt(part, 10);
                        if (isNaN(octet) || octet < 0 || octet > 255) {
                          return '00';
                        }
                        var hex = octet.toString(16);
                        return hex.length === 1 ? '0' + hex : hex;
                      }).join(':');
                    }

                    if (/^[0-9a-f]{12}$/.test(raw)) {
                      return raw.match(/../g).join(':');
                    }

                    return raw;
                  }

                  function macFromIndex(index) {
                    var parts = String(index || '').split('.').map(function (part) {
                      return parseInt(part, 10);
                    }).filter(function (part) {
                      return !isNaN(part) && part >= 0 && part <= 255;
                    });

                    if (parts.length < 6) {
                      return '';
                    }

                    return parts.slice(parts.length - 6).map(function (octet) {
                      var hex = octet.toString(16);
                      return hex.length === 1 ? '0' + hex : hex;
                    }).join(':');
                  }

                  data.forEach(function (element) {
                    element['{#CLIENTMAC}'] = formatMac(element['{#CLIENTMAC}']) || macFromIndex(element['{#SNMPINDEX}']);
                  });

                  return JSON.stringify(data);
          item_prototypes:
            - uuid: 2e7d180f0ca349f0b16fd3f9608cde8a
              name: 'Client [{#CLIENTMAC}] on {#APNAME}: MAC'
              type: DEPENDENT
              key: 'hwWlanStaMac[{#SNMPINDEX}]'
              history: 30d
              value_type: TEXT
              trends: '0'
              master_item:
